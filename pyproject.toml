[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "metaos"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = ["pyyaml"]

[project.optional-dependencies]
dev = [
    "build",
    "mypy",
    "pytest",
    "pytest-cov",
    "ruff",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
metaos = "metaos.cli:main"

[tool.ruff]
line-length = 88
extend-exclude = ["src", "config", "root", "build", "dist", "tests"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.mypy]
python_version = "3.11"
files = [
    "metaos",
    "kernel",
    "strategy",
    "evolution",
    "metrics",
    "insights",
]
exclude = "^(docs|src|tests)/"
ignore_missing_imports = true
follow_imports = "silent"
disable_error_code = ["import-untyped", "type-var", "assignment", "call-overload", "union-attr", "arg-type", "valid-type", "attr-defined"]
warn_unused_ignores = true
warn_redundant_casts = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["metaos"]
omit = ["tests/*"]
