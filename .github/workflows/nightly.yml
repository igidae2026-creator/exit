name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Nightly long-run tier
        env:
          PYTHONPATH: ${{ github.workspace }}
          METAOS_NIGHTLY: "1"
          METAOS_SOAK_FAST: "1"
        run: |
          pytest -q tests/test_nightly_perf_tiers.py
          python -m metaos.cli long-run-check --ticks 10000 --seed 42
